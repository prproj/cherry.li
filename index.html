    <script>
        function createStar(container, size, className) {
            const star = document.createElement('div');
            star.className = `star ${className}`;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            container.appendChild(star);
        }
        
        const layer1 = document.getElementById('starsLayer1');
        const layer2 = document.getElementById('starsLayer2');
        for (let i = 0; i < 20; i++) {
            createStar(layer1, 'large', 'size-large');
        }
        for (let i = 0; i < 30; i++) {
            createStar(layer1, 'medium', 'size-medium');
        }
        for (let i = 0; i < 80; i++) {
            createStar(layer2, 'small', 'size-small');
        }
        // parallax effect!! :)
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            const moveX1 = (mouseX - 0.5) * 40;
            const moveY1 = (mouseY - 0.5) * 40;
            layer1.style.transform = `translate(${moveX1}px, ${moveY1}px)`;
            const moveX2 = (mouseX - 0.5) * 20;
            const moveY2 = (mouseY - 0.5) * 20;
            layer2.style.transform = `translate(${moveX2}px, ${moveY2}px)`;
        });
    </script>
