    <script>
        const splash = document.getElementById('splash');
        const bgVideo = document.getElementById('bg-video');
        const muteBtn = document.getElementById('mute-btn');
        const iconSound = document.getElementById('icon-sound');
        const iconMute = document.getElementById('icon-mute');

        splash.addEventListener('click', () => {
            bgVideo.muted = false;
            bgVideo.volume = 0.4;
            bgVideo.play();

            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                document.querySelector('.main-content').classList.add('revealed');
                document.getElementById('now-playing').classList.add('visible');
            }, 0);
        });

        muteBtn.addEventListener('click', () => {
            bgVideo.muted = !bgVideo.muted;
            iconSound.style.display = bgVideo.muted ? 'none' : 'block';
            iconMute.style.display  = bgVideo.muted ? 'block' : 'none';
        });
    </script>
    <script src="assets/content/scripts/lanyard.js"></script>
    <script src="assets/content/scripts/motd.js"></script>
    <script>
        const motdObserver = new MutationObserver(() => {
            const el = document.getElementById("motd");
            el.setAttribute("data-text", el.textContent);
        });
        document.addEventListener("DOMContentLoaded", () => {
            const el = document.getElementById("motd");
            motdObserver.observe(el, { childList: true, characterData: true, subtree: true });
        });
    </script>
